<!DOCTYPE html>
<html lang="it" class="auth-pending">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code · Reservo</title>
<link rel="icon" href="assets/img/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
html.auth-pending body { visibility: hidden; }

.qr-card {
  max-width: 480px;
  text-align: center;
}
.qr-card .qr-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.2rem;
  padding: 2rem 0 1rem;
}
.qr-card #qrcode canvas,
.qr-card #qrcode img {
  border-radius: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,.12);
}
.qr-url {
  font-size: .8rem;
  color: var(--text-mid, #666);
  word-break: break-all;
}
.qr-actions {
  display: flex;
  gap: .75rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: .5rem;
}

@media print {
  .sidebar, .topbar, .qr-actions, .card-header, .qr-url, p { display: none !important; }
  .app-shell { display: block !important; }
  .main { margin: 0 !important; padding: 0 !important; }
  .content { padding: 0 !important; }
  .card { box-shadow: none !important; border: none !important; }
  .qr-box { padding: 0 !important; }
  #qrcode { margin: 0 auto; }
}
</style>
<script type="module">
  import { requireAuth } from './assets/js/auth.js';
  requireAuth();
</script>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="content">

      <div class="card qr-card">
        <div class="card-header"><h2>QR Code</h2></div>
        <p class="text-mid small" style="padding:0 .5rem">
          Stampa questo QR code e mettilo in vetrina o sui tavoli: i clienti potranno consultare il menu e prenotare direttamente da smartphone.
        </p>
        <div class="qr-box">
          <div id="qrcode"></div>
          <div class="qr-url" id="qrUrl"></div>
        </div>
        <div class="qr-actions">
          <button type="button" class="btn btn-outline" id="downloadQr">Scarica PNG</button>
          <button type="button" class="btn btn-primary" id="printQr">Stampa</button>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="assets/js/db.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/qr.js"></script>
</body>
</html>
