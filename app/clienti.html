<!DOCTYPE html>
<html lang="it" class="auth-pending">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clienti · Reservo</title>
<link rel="icon" href="assets/img/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>html.auth-pending body { visibility: hidden; }</style>
<script type="module">
  import { requireAuth } from './assets/js/auth.js';
  requireAuth();
</script>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="content">

      <div class="card mb-3" id="anagraficaCard" style="display:none">
        <div class="card-header">
          <h2>Anagrafica clienti</h2>
          <div class="flex gap-2">
            <input type="search" id="anagraficaSearch" placeholder="Cerca per nome, cognome, email, telefono o codice fiscale..." style="width:100%; max-width:320px">
            <button class="btn btn-outline btn-sm" id="exportAnagraficaBtn">Esporta CSV</button>
            <button class="btn btn-primary btn-sm" id="addCustomerBtn">+ Aggiungi cliente</button>
          </div>
        </div>
        <div id="anagraficaTable" class="responsive-table"></div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>Clienti</h2>
          <div class="flex gap-2">
            <input type="search" id="searchInput" placeholder="Cerca per nome, email o telefono..." style="width:100%; max-width:280px">
            <button class="btn btn-outline btn-sm" id="exportCsvBtn">Esporta CSV</button>
          </div>
        </div>
        <div id="customersTable" class="responsive-table"></div>
      </div>

    </main>
  </div>
</div>

<!-- Modal storico cliente -->
<div class="modal-overlay" id="customerModal">
  <div class="modal">
    <h3 id="customerModalTitle">Cliente</h3>
    <div id="customerModalBody" class="responsive-table"></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-outline" data-close>Chiudi</button>
    </div>
  </div>
</div>

<!-- Modal nuovo/modifica cliente (anagrafica) -->
<div class="modal-overlay" id="anagraficaModal">
  <div class="modal">
    <h3 id="anagraficaModalTitle">Nuovo cliente</h3>
    <form id="anagraficaForm">
      <input type="hidden" id="acId">
      <div class="field-row">
        <div class="field"><label>Nome</label><input type="text" id="acName" required></div>
        <div class="field"><label>Cognome</label><input type="text" id="acSurname"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Email</label><input type="email" id="acEmail"></div>
        <div class="field"><label>Telefono</label><input type="text" id="acPhone"></div>
      </div>
      <div class="field-row">
        <div class="field ac-birth-date"><label>Data di nascita</label><input type="date" id="acBirthDate"></div>
        <div class="field ac-fiscal-code"><label>Codice fiscale</label><input type="text" id="acFiscalCode" style="text-transform:uppercase"></div>
      </div>
      <div class="field"><label>Indirizzo</label><input type="text" id="acAddress"></div>
      <div class="field-row">
        <div class="field"><label>Città</label><input type="text" id="acCity"></div>
        <div class="field" style="max-width:120px"><label>Provincia</label><input type="text" id="acProvince" maxlength="2" style="text-transform:uppercase"></div>
      </div>
      <div class="field"><label>Note</label><textarea id="acNotes" rows="3"></textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" data-close>Annulla</button>
        <button type="button" class="btn btn-danger" id="deleteCustomerBtn" style="display:none">Elimina</button>
        <button type="submit" class="btn btn-primary">Salva</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal scheda anagrafica cliente -->
<div class="modal-overlay" id="schedaModal">
  <div class="modal">
    <h3 id="schedaModalTitle">Scheda cliente</h3>
    <div id="schedaModalBody"></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-outline" data-close>Chiudi</button>
      <button type="button" class="btn btn-outline" id="schedaNewBookingBtn">+ Appuntamento</button>
      <button type="button" class="btn btn-primary" id="schedaEditBtn">Modifica anagrafica</button>
    </div>
  </div>
</div>

<script src="assets/js/db.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/clienti.js"></script>
<script type="module" src="assets/js/feedback-widget.js"></script>
</body>
</html>
